<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Green Screen Remover</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f0f2f5;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            padding: 20px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 { margin-top: 0; color: #333; }

        .controls {
            margin: 20px 0;
            display: flex;
            gap: 15px;
            justify-content: center;
            align-items: center;
            flex-wrap: wrap;
        }

        input[type="file"] {
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
        }

        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            transition: background 0.2s;
        }

        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #ccc; cursor: not-allowed; }

        canvas {
            max-width: 100%;
            height: auto;
            border: 1px solid #ddd;
            background-image: linear-gradient(45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(-45deg, #ccc 25%, transparent 25%), 
                              linear-gradient(45deg, transparent 75%, #ccc 75%), 
                              linear-gradient(-45deg, transparent 75%, #ccc 75%);
            background-size: 20px 20px;
            background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            margin-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Green Screen Remover</h1>
    <p>Upload your image, adjust the tolerance, and download the result.</p>

    <div class="controls">
        <input type="file" id="upload" accept="image/*">
        
        <div class="slider-container">
            <label for="tolerance">Tolerance:</label>
            <input type="range" id="tolerance" min="0" max="100" value="40">
            <span id="toleranceValue">40</span>
        </div>
    </div>

    <canvas id="canvas"></canvas>
    
    <div class="controls">
        <button id="downloadBtn" disabled>Download Transparent PNG</button>
    </div>
</div>

<script>
    const upload = document.getElementById('upload');
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const toleranceSlider = document.getElementById('tolerance');
    const toleranceValue = document.getElementById('toleranceValue');
    const downloadBtn = document.getElementById('downloadBtn');

    let originalImage = null;

    // Handle File Upload
    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (event) => {
            const img = new Image();
            img.onload = () => {
                originalImage = img;
                // Set canvas size to match image
                canvas.width = img.width;
                canvas.height = img.height;
                processImage();
                downloadBtn.disabled = false;
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    // Handle Slider Change
    toleranceSlider.addEventListener('input', (e) => {
        toleranceValue.textContent = e.target.value;
        if (originalImage) processImage();
    });

    function processImage() {
        if (!originalImage) return;

        // Draw original image
        ctx.drawImage(originalImage, 0, 0);

        // Get pixel data
        const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
        const data = imageData.data;

        const tolerance = parseInt(toleranceSlider.value);

        // Loop through every pixel
        for (let i = 0; i < data.length; i += 4) {
            const r = data[i];
            const g = data[i + 1];
            const b = data[i + 2];
            // const a = data[i + 3]; // Alpha

            // CHROMA KEY LOGIC:
            // If Green is significantly higher than Red AND Blue
            // We make it transparent.
            
            // We use the tolerance to determine how "pure" the green needs to be.
            // A higher tolerance means we remove more shades of green.
            
            if (g > r + tolerance && g > b + tolerance) {
                data[i + 3] = 0; // Set Alpha to 0 (Transparent)
            }
        }

        // Put the modified data back
        ctx.putImageData(imageData, 0, 0);
    }

    // Handle Download
    downloadBtn.addEventListener('click', () => {
        const link = document.createElement('a');
        link.download = 'removed-green.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
    });
</script>

</body>
</html>
